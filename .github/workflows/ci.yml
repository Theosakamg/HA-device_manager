name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  quality-backend:
    name: Backend Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/quality-backend

  quality-frontend:
    name: Frontend Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/quality-frontend

  build:
    name: Build Component
    runs-on: ubuntu-latest
    needs: [quality-backend, quality-frontend]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Copy frontend build to component
        run: |
          mkdir -p custom_components/device_manager/frontend/dist
          cp frontend/dist/device-manager.js custom_components/device_manager/frontend/dist/

      - name: Create release artifact
        run: |
          cd custom_components
          zip -r ../device_manager.zip device_manager/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: device_manager
          path: device_manager.zip
          retention-days: 7

  validate-hacs:
    name: Validate HACS
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
